<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Companion App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 50px;
      background: #22c55e;
      color: #000;
      font-weight: 600;
      margin-top: 10px;
    }

    .coming {
      font-size: 1.2rem;
      margin-top: 15px;
      opacity: 0.9;
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🚀 GitHub Companion App</h1>
    <p>A smart tool to monitor, manage, and enhance your GitHub workflow.</p>

    <div class="badge">Under Development</div>
    <div class="coming">🌐 Website Coming Soon...</div>

    <footer>
      Built by Aahil • Stay tuned 👀
    </footer>
  </div>

</body>
</html>
